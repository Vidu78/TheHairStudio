<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>The Hair Studio</title>
  <meta name="description" content="Prenota il tuo appuntamento al The Hair Studio – Noci (BA)" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#C9A84C" />

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hair Studio" />
  <link rel="apple-touch-icon" href="/logo192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/logo192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/logo512.png" />

  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="The Hair Studio" />

  <link rel="icon" type="image/png" href="/logo192.png" />

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #0A0A0A; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
    /* Splash mentre carica il bundle JS — sparisce non appena React monta */
    #pwa-boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0A0A0A; z-index: 0;
    }
    #pwa-boot .logo {
      width: 96px; height: 96px; border-radius: 48px;
      background: rgba(201,168,76,0.15);
      border: 2px solid #C9A84C;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; color: #C9A84C;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="pwa-boot"><div class="logo">&#9986;</div></div>
  </div>

  <!-- Service Worker registration: registra /sw.js e notifica gli aggiornamenti via CustomEvent -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').then(function (reg) {
          // Quando viene trovato un nuovo SW
          reg.addEventListener('updatefound', function () {
            var newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', function () {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // C'e' una nuova versione installata e un controller attivo:
                // notifica il banner di aggiornamento.
                window.__PWA_NEW_WORKER__ = newWorker;
                window.dispatchEvent(new CustomEvent('pwa-update-available'));
              }
            });
          });
        }).catch(function (err) { console.warn('[PWA] SW register fail:', err); });

        // Quando il nuovo SW prende il controllo, ricarica per servire la nuova versione
        var reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (reloaded) return;
          reloaded = true;
          window.location.reload();
        });
      });
    })();
  </script>
</body>
</html>
