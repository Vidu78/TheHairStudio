<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>The Hair Studio</title>
  <meta name="description" content="Prenota il tuo appuntamento al The Hair Studio – Noci (BA)" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#C9A84C" />

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hair Studio" />
  <link rel="apple-touch-icon" href="/logo192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/logo192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/logo512.png" />

  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="The Hair Studio" />

  <link rel="icon" type="image/png" href="/logo192.png" />

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #0A0A0A; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
    #pwa-boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0A0A0A; z-index: 1; pointer-events: none;
      transition: opacity .3s ease;
    }
    #pwa-boot.is-hidden { opacity: 0; }
    #pwa-boot .logo {
      width: 96px; height: 96px; border-radius: 48px;
      background: rgba(201,168,76,0.15);
      border: 2px solid #C9A84C;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; color: #C9A84C;
    }
    #pwa-error {
      position: fixed; top: 0; left: 0; right: 0;
      background: #2a0000; color: #ff7070;
      padding: 14px 16px; font-size: 11px; line-height: 1.4;
      z-index: 999999;
      white-space: pre-wrap; word-break: break-word;
      max-height: 70vh; overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      border-bottom: 2px solid #ff4444;
    }
    #pwa-error h3 { margin: 0 0 8px; color: #ff4444; font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="pwa-boot" aria-hidden="true"><div class="logo">&#9986;</div></div>

  <!-- Error capture GLOBALE: cattura QUALSIASI errore JS (sync, async,
       promise rejection) e lo mostra a schermo. Indispensabile per
       debuggare la "schermata nera" quando ErrorBoundary di React non
       riesce a montare (errore PRIMA di React, es. import-time). -->
  <script>
    (function () {
      function showErr(label, msg, stack) {
        try {
          var box = document.getElementById('pwa-error');
          if (!box) {
            box = document.createElement('div');
            box.id = 'pwa-error';
            box.innerHTML = '<h3>⚠️ Errore JavaScript</h3>';
            (document.body || document.documentElement).appendChild(box);
          }
          var entry = document.createElement('div');
          entry.style.cssText = 'margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #ff444466;';
          entry.textContent = '[' + label + '] ' + (msg || '?') + (stack ? '\n' + stack.split('\n').slice(0, 6).join('\n') : '');
          box.appendChild(entry);
        } catch (_) {}
      }
      window.addEventListener('error', function (e) {
        var msg = e?.message || (e?.error && e.error.message) || 'errore sconosciuto';
        var stack = (e?.error && e.error.stack) || '';
        // Filtra errori innocui (es. ResizeObserver loop limit)
        if (/ResizeObserver loop/.test(msg)) return;
        showErr('error', msg, stack);
      }, true);
      window.addEventListener('unhandledrejection', function (e) {
        var r = e?.reason;
        var msg = (r && r.message) || (typeof r === 'string' ? r : JSON.stringify(r));
        var stack = (r && r.stack) || '';
        showErr('promise', msg, stack);
      });
    })();
  </script>

  <!-- Nasconde lo splash quando React ha montato qualcosa in #root -->
  <script>
    (function () {
      var root = document.getElementById('root');
      var boot = document.getElementById('pwa-boot');
      if (!root || !boot) return;
      var hide = function () {
        boot.classList.add('is-hidden');
        setTimeout(function () { if (boot.parentNode) boot.parentNode.removeChild(boot); }, 400);
      };
      // MutationObserver: appena React inietta children in #root, nascondi
      var mo = new MutationObserver(function () {
        if (root.children.length > 0) { mo.disconnect(); hide(); }
      });
      mo.observe(root, { childList: true });
      // Safety: rimuovi dopo 15s
      setTimeout(hide, 15000);
    })();
  </script>

  <!-- Service Worker registration + banner aggiornamento vanilla -->
  <script src="/sw-register.js" defer></script>
</body>
</html>
